---
# Minecraft Configuration Variables
minecraft_java_version: "1.21.11"
minecraft_java_type: "VANILLA"
minecraft_java_memory: "2G"
minecraft_java_max_players: 15
minecraft_java_online_mode: "FALSE"
minecraft_java_gamemode: "survival"
minecraft_java_difficulty: "normal"
minecraft_java_motd: "Mineclifford — 15 slots vanilla"
minecraft_java_allow_nether: true
minecraft_java_enable_command_block: false
minecraft_java_spawn_protection: 0
minecraft_java_view_distance: 8
minecraft_java_simulation_distance: 6

# Bedrock Edition — disabled (vanilla Java only)
minecraft_bedrock_enabled: false

# Mod Support — set minecraft_java_type to FABRIC, FORGE, or NEOFORGE when using mods
# Example for Create mod (Fabric):
#   minecraft_java_type: "FABRIC"
#   minecraft_java_version: "1.20.1"
#   minecraft_modrinth_projects: "create-fabric,fabric-api"
#   minecraft_modrinth_download_deps: "required"
#   minecraft_mod_loader_version: ""  # empty = latest
minecraft_modrinth_projects: ""
minecraft_modrinth_download_deps: "required"
minecraft_mod_loader_version: ""

# Monitoring Configuration
# Override these in minecraft_secrets.yml (gitignored) with secure values.
# If left commented out, the playbook defaults will be used.
# rcon_password: "set-in-secrets"
# grafana_password: "set-in-secrets"
timezone: "America/Sao_Paulo"

# Server Names
server_names:
  - instance1

# Swarm Configuration
single_node_swarm: true

# World import — set in minecraft_secrets.yml with local path (gitignored)
# minecraft_world_import: "/path/to/world_imports/backup.tar.gz"
# minecraft_world_import_dir: "/tmp/minecraft-world-import"

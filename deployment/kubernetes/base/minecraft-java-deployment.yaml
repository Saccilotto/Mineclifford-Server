apiVersion: apps/v1
kind: Deployment
metadata:
  name: minecraft-java
  labels:
    app: minecraft-java
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minecraft-java
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: minecraft-java
    spec:
      containers:
      - name: minecraft-java
        image: itzg/minecraft-server:latest
        envFrom:
        - configMapRef:
            name: minecraft-config
        ports:
        - containerPort: 25565
        resources:
          requests:
            memory: "2Gi"
            cpu: "500m"
          limits:
            memory: "3Gi"
            cpu: "1000m"
        volumeMounts:
        - name: minecraft-java-data
          mountPath: /data
      volumes:
      - name: minecraft-java-data
        persistentVolumeClaim:
          claimName: minecraft-java-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: minecraft-java
spec:
  selector:
    app: minecraft-java
  ports:
  - port: 25565
    targetPort: 25565
    protocol: TCP
  type: LoadBalancer

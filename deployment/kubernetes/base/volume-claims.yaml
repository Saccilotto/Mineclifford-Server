apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minecraft-java-pvc
  labels:
    app: minecraft
    edition: java
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minecraft-bedrock-pvc
  labels:
    app: minecraft
    edition: bedrock
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard

{{- if or .Values.prometheus.enabled .Values.grafana.enabled }}
---
{{- if .Values.prometheus.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "minecraft.fullname" . }}-prometheus
  labels:
    {{- include "minecraft.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "minecraft.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: prometheus
  template:
    metadata:
      labels:
        {{- include "minecraft.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: prometheus
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus:latest
        args:
        - "--config.file=/etc/prometheus/prometheus.yml"
        - "--storage.tsdb.path=/prometheus"
        - "--web.console.libraries=/usr/share/prometheus/console_libraries"
        - "--web.console.templates=/usr/share/prometheus/consoles"
        ports:
        - containerPort: 9090
        volumeMounts:
        - name: prometheus-config
          mountPath: /etc/prometheus
        - name: prometheus-storage
          mountPath: /prometheus
      volumes:
      - name: prometheus-config
        configMap:
          name: {{ include "minecraft.fullname" . }}-prometheus-config
      - name: prometheus-storage
        persistentVolumeClaim:
          claimName: {{ include "minecraft.fullname" . }}-prometheus-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "minecraft.fullname" . }}-prometheus
  labels:
    {{- include "minecraft.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
spec:
  selector:
    {{- include "minecraft.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
  ports:
  - port: 9090
    targetPort: 9090
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "minecraft.fullname" . }}-prometheus-pvc
  labels:
    {{- include "minecraft.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.prometheus.server.persistentVolume.size }}
  {{- if .Values.prometheus.server.persistentVolume.storageClass }}
  storageClassName: {{ .Values.prometheus.server.persistentVolume.storageClass | quote }}
  {{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "minecraft.fullname" . }}-prometheus-config
  labels:
    {{- include "minecraft.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
      - job_name: 'minecraft-java'
        static_configs:
          - targets: ['{{ include "minecraft.fullname" . }}-exporter:9150']
            labels:
              instance: 'minecraft-java'
              type: 'java'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "minecraft.fullname" . }}-exporter
  labels:
    {{- include "minecraft.labels" . | nindent 4 }}
    app.kubernetes.io/component: exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "minecraft.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: exporter
  template:
    metadata:
      labels:
        {{- include "minecraft.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: exporter
    spec:
      containers:
      - name: minecraft-exporter
        image: hkubota/minecraft-exporter:latest
        ports:
        - containerPort: 9150
        env:
        - name: MC_SERVER
          value: {{ include "minecraft.fullname" . }}-java
        - name: MC_PORT
          value: "25565"
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "minecraft.fullname" . }}-exporter
  labels:
    {{- include "minecraft.labels" . | nindent 4 }}
    app.kubernetes.io/component: exporter
spec:
  selector:
    {{- include "minecraft.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: exporter
  ports:
  - port: 9150
    targetPort: 9150
  type: ClusterIP
{{- end }}
---
{{- if .Values.grafana.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "minecraft.fullname" . }}-grafana
  labels:
    {{- include "minecraft.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "minecraft.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: grafana
  template:
    metadata:
      labels:
        {{- include "minecraft.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:latest
        ports:
        - containerPort: 3000
        env:
        - name: GF_SECURITY_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "minecraft.fullname" . }}-grafana-secrets
              key: admin-password
        - name: GF_USERS_ALLOW_SIGN_UP
          value: "false"
        volumeMounts:
        - name: grafana-storage
          mountPath: /var/lib/grafana
      volumes:
      - name: grafana-storage
        persistentVolumeClaim:
          claimName: {{ include "minecraft.fullname" . }}-grafana-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "minecraft.fullname" . }}-grafana
  labels:
    {{- include "minecraft.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  selector:
    {{- include "minecraft.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
  ports:
  - port: 3000
    targetPort: 3000
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "minecraft.fullname" . }}-grafana-pvc
  labels:
    {{- include "minecraft.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.grafana.persistence.size }}
  {{- if .Values.grafana.persistence.storageClass }}
  storageClassName: {{ .Values.grafana.persistence.storageClass | quote }}
  {{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "minecraft.fullname" . }}-grafana-secrets
  labels:
    {{- include "minecraft.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
type: Opaque
stringData:
  admin-password: {{ .Values.grafana.adminPassword | quote }}
{{- end }}
{{- end }}

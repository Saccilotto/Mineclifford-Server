version: '3.8'

services:
  # Java Edition Minecraft Server
  minecraft-java:
    image: itzg/minecraft-server:latest
    environment:
      - EULA=TRUE
      - VERSION={{ minecraft_java_version | default('LATEST') }}
      - TYPE={{ minecraft_java_type | default('VANILLA') }}
      - MEMORY={{ minecraft_java_memory | default('2G') }}
      - DIFFICULTY={{ minecraft_java_difficulty | default('normal') }}
      - MODE={{ minecraft_java_gamemode | default('survival') }}
      - MOTD={{ minecraft_java_motd | default('Mineclifford — 5 slots vanilla') }}
      - OPS={{ minecraft_java_ops | default('') }}
      - MAX_PLAYERS={{ minecraft_java_max_players | default(15) }}
      - ONLINE_MODE={{ minecraft_java_online_mode | default('FALSE') }}
      - ENABLE_RCON=true
      - RCON_PASSWORD={{ rcon_password | default('minecraft') }}
      - ALLOW_NETHER={{ minecraft_java_allow_nether | default('true') }}
      - ENABLE_COMMAND_BLOCK={{ minecraft_java_enable_command_block | default('false') }}
      - SPAWN_PROTECTION={{ minecraft_java_spawn_protection | default('0') }}
      - VIEW_DISTANCE={{ minecraft_java_view_distance | default('8') }}
      - SIMULATION_DISTANCE={{ minecraft_java_simulation_distance | default('6') }}
      - JVM_XX_OPTS=-XX:+UseG1GC -XX:G1HeapRegionSize=4M -XX:+UnlockExperimentalVMOptions -XX:+ParallelRefProcEnabled -XX:MaxGCPauseMillis=200
{% if minecraft_world_import is defined %}
      - WORLD=/import_world/world.tar.gz
{% endif %}
{% if minecraft_modrinth_projects is defined and minecraft_modrinth_projects != '' %}
      - MODRINTH_PROJECTS={{ minecraft_modrinth_projects }}
      - MODRINTH_DOWNLOAD_DEPENDENCIES={{ minecraft_modrinth_download_deps | default('required') }}
{% endif %}
{% if minecraft_mod_loader_version is defined and minecraft_mod_loader_version != '' %}
{% if minecraft_java_type | default('VANILLA') | upper == 'FABRIC' %}
      - FABRIC_LOADER_VERSION={{ minecraft_mod_loader_version }}
{% elif minecraft_java_type | default('VANILLA') | upper == 'FORGE' %}
      - FORGE_VERSION={{ minecraft_mod_loader_version }}
{% elif minecraft_java_type | default('VANILLA') | upper == 'NEOFORGE' %}
      - NEOFORGE_VERSION={{ minecraft_mod_loader_version }}
{% endif %}
{% endif %}
      - TZ={{ timezone | default('America/Sao_Paulo') }}
    ports:
      - "25565:25565"
    volumes:
      - minecraft_java_data:/data
{% if minecraft_world_import is defined %}
      - {{ minecraft_world_import_dir | default('/tmp/minecraft-world-import') }}:/import_world:ro
{% endif %}
    deploy:
      resources:
        limits:
          memory: {{ minecraft_java_memory_limit | default('3G') }}
        reservations:
          memory: {{ minecraft_java_memory | default('2G') }}
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      labels:
        com.mineclifford.service: "minecraft-java"
        com.mineclifford.type: "game-server"
        com.mineclifford.edition: "java"
        com.centurylinklabs.watchtower.enable: "true"
        com.centurylinklabs.watchtower.stop-signal: "SIGTERM"
    networks:
      - minecraft_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

{% if minecraft_bedrock_enabled | default(false) %}
  # Bedrock Edition Minecraft Server
  minecraft-bedrock:
    image: itzg/minecraft-bedrock-server:{{ minecraft_bedrock_version | default('latest') }}
    environment:
      - EULA=TRUE
      - GAMEMODE={{ minecraft_bedrock_gamemode | default('survival') }}
      - DIFFICULTY={{ minecraft_bedrock_difficulty | default('normal') }}
      - SERVER_NAME={{ minecraft_bedrock_server_name | default('Mineclifford Bedrock Server') }}
      - LEVEL_NAME={{ minecraft_bedrock_level_name | default('Mineclifford') }}
      - ALLOW_CHEATS={{ minecraft_bedrock_allow_cheats | default('false') }}
      - MAX_PLAYERS={{ minecraft_bedrock_max_players | default('10') }}
      - VIEW_DISTANCE={{ minecraft_bedrock_view_distance | default('10') }}
      - DEFAULT_PLAYER_PERMISSION_LEVEL={{ minecraft_bedrock_permission_level | default('member') }}
      - TZ={{ timezone | default('America/Sao_Paulo') }}
    ports:
      - "19132:19132/udp"
    volumes:
      - minecraft_bedrock_data:/data
    deploy:
      resources:
        limits:
          memory: 2G
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      labels:
        com.mineclifford.service: "minecraft-bedrock"
        com.mineclifford.type: "game-server"
        com.mineclifford.edition: "bedrock"
        com.centurylinklabs.watchtower.enable: "true"
        com.centurylinklabs.watchtower.stop-signal: "SIGTERM"
    networks:
      - minecraft_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
{% endif %}

  # RCON Web Admin — access via SSH tunnel: ssh -L 4326:localhost:4326 user@server
  # When the web dashboard comes online, Traefik will proxy this with SSL/auth.
  rcon-web-admin:
    image: itzg/rcon:latest
    ports:
      - "127.0.0.1:4326:4326"
      - "127.0.0.1:4327:4327"
    volumes:
      - rcon_web_admin_data:/opt/rcon-web-admin/db
    environment:
      - RWA_PASSWORD={{ rcon_password | default('minecraft') }}
      - RWA_ADMIN=true
      - RWA_RCON_HOST=minecraft-java
      - RWA_RCON_PORT=25575
      - RWA_RCON_PASSWORD={{ rcon_password | default('minecraft') }}
    depends_on:
      - minecraft-java
    networks:
      - minecraft_network
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      labels:
        com.mineclifford.service: "rcon-web-admin"
        com.mineclifford.type: "management"

  # Watchtower — auto-updates containers with the watchtower.enable label.
  # Only updates the Docker IMAGE, not world data or mods on volumes.
  # --stop-timeout 120s gives Minecraft time to save the world before stopping.
  # --rolling-restart restarts containers one at a time.
  watchtower:
    image: containrrr/watchtower:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_ROLLING_RESTART=true
      - WATCHTOWER_STOP_TIMEOUT=120s
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=86400
    deploy:
      restart_policy:
        condition: on-failure
      labels:
        com.mineclifford.service: "watchtower"
        com.mineclifford.type: "management"
    networks:
      - minecraft_network

volumes:
  minecraft_java_data:
{% if minecraft_bedrock_enabled | default(false) %}
  minecraft_bedrock_data:
{% endif %}
  rcon_web_admin_data:

networks:
  minecraft_network:
    driver: overlay
    attachable: true
